<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami Medical Center | Smart Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-hospital-user"></i> Medical Center</h1>
            <div class="stats-container">
                <div class="stat-card"><h5>Total Patients</h5><h2 id="total-pts">0</h2></div>
                <div class="stat-card" style="border-top-color:#10b981"><h5>Free Doctors</h5><h2 id="avail-docs">0</h2></div>
                <div class="stat-card" style="border-top-color:#f59e0b"><h5>Busy Doctors</h5><h2 id="busy-docs">0</h2></div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('patients')">Patients</button>
            <button class="tab-btn" onclick="showTab('doctors')">Doctors</button>
            <button class="tab-btn" onclick="showTab('appointments')">Appointments</button>
        </div>

        <section id="patients" class="content-section active">
            <div class="card">
                <h3>Register Patient</h3>
                <div class="form-group"><input type="text" id="p-name" placeholder="Name"></div>
                <div class="form-group"><input type="number" id="p-age" placeholder="Age"></div>
                <div class="form-group">
                    <input list="disease-options" id="p-disease" placeholder="Disease">
                    <datalist id="disease-options">
                        <option value="Fever"> <option value="Heart Ache"> <option value="Flu">
                    </datalist>
                </div>
                <div class="form-group"><input type="text" id="p-contact" placeholder="Contact"></div>
                <button class="main-btn" onclick="addPatient()">Add Patient</button>
            </div>
            <div class="table-container">
                <h3>Registered Patients</h3>
                <table>
                    <thead><tr><th>ID</th><th>Name</th><th>Disease</th><th>Action</th></tr></thead>
                    <tbody id="patientListBody"></tbody>
                </table>
            </div>
        </section>

        <section id="doctors" class="content-section">
            <div class="card">
                <h3>Register Doctor</h3>
                <div class="form-group"><input type="text" id="d-name" placeholder="Dr. Name"></div>
                <div class="form-group">
                    <input list="spec-options" id="d-spec" placeholder="Specialization">
                    <datalist id="spec-options">
                        <option value="General Physician"> <option value="Cardiologist"> <option value="Eye Specialist">
                    </datalist>
                </div>
                <div class="form-group"><input type="text" id="d-phone" placeholder="Phone"></div>
                <button class="main-btn" onclick="addDoctor()">Save Doctor</button>
            </div>
            <div class="table-container">
                <h3>Hospital Staff (Doctors)</h3>
                <table>
                    <thead><tr><th>ID</th><th>Name</th><th>Specialization</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="doctorListBody"></tbody>
                </table>
            </div>
        </section>

        <section id="appointments" class="content-section">
            <div class="card">
                <h3>Smart Booking</h3>
                <div class="form-group">
                    <label>Patient:</label>
                    <select id="a-pname"><option value="">Select Patient</option></select>
                </div>
                <div class="form-group">
                    <label>Doctor:</label>
                    <select id="a-did"><option value="">Select Doctor</option></select>
                </div>
                <div class="form-group">
                    <label>Date:</label>
                    <input type="date" id="a-date">
                </div>
                <button class="main-btn" onclick="bookAppointment()">Confirm Booking</button>
            </div>
            <div class="table-container">
                <h3>Booking Records</h3>
                <table>
                    <thead><tr><th>ID</th><th>Patient</th><th>Disease</th><th>Doctor</th><th>Date</th><th>Status</th><th>Manage</th></tr></thead>
                    <tbody id="apptBody"></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
